<!DOCTYPE html>
<html lang="id" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pusat Kendali - TeratePay</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@0.292.0"></script>
    <script src="https://unpkg.com/vue@3.3.4/dist/vue.global.prod.js"></script>
    
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc; /* Latar Terang Modern */
            color: #0f172a;
            -webkit-tap-highlight-color: transparent; 
        }
        
        /* Efek Latar Belakang ala Startup Decacorn */
        .mesh-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1;
            background-image: 
                radial-gradient(at 10% 0%, hsla(160, 80%, 75%, 0.4) 0px, transparent 50%),
                radial-gradient(at 90% 10%, hsla(210, 90%, 80%, 0.4) 0px, transparent 50%),
                radial-gradient(at 50% 90%, hsla(280, 80%, 85%, 0.4) 0px, transparent 50%);
            filter: blur(40px);
        }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 20px 40px -15px rgba(0,0,0,0.05);
        }
        
        .glass-header {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(226, 232, 240, 0.8);
        }

        [v-cloak] { display: none !important; }
        
        /* Animasi Transisi Halus */
        .fade-enter-active, .fade-leave-active { transition: opacity 0.3s ease, transform 0.3s ease; }
        .fade-enter-from, .fade-leave-to { opacity: 0; transform: translateY(-10px); }
    </style>
</head>
<body class="selection:bg-emerald-500 selection:text-white lg:p-6 min-h-screen relative flex flex-col items-center justify-center">
    <div class="mesh-bg"></div>

    <div id="app" v-cloak class="w-full">
        
        <!-- Toast Notification (Light Theme) -->
        <div id="toastContainer" class="fixed top-5 left-1/2 -translate-x-1/2 z-[999] flex flex-col gap-2 pointer-events-none w-full max-w-sm px-4">
            <transition-group name="fade" tag="div">
                <div v-for="t in toasts" :key="t.id" class="bg-white border border-emerald-100 text-slate-800 px-5 py-3.5 rounded-2xl shadow-xl font-bold text-sm text-center pointer-events-auto mb-2 flex items-center justify-center gap-2">
                    <i data-lucide="check-circle" class="w-5 h-5 text-emerald-500"></i> {{ t.msg }}
                </div>
            </transition-group>
        </div>

        <main class="mx-auto w-full max-w-5xl glass-panel lg:rounded-[2.5rem] overflow-hidden flex flex-col relative z-10 min-h-screen lg:min-h-min pb-24 lg:pb-0 shadow-2xl shadow-slate-200/50">
            
            <!-- Navbar Admin -->
            <header class="p-6 flex justify-between items-center glass-header">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-white rounded-2xl flex items-center justify-center border border-slate-100 shadow-sm">
                        <i data-lucide="command" class="w-6 h-6 text-indigo-500"></i>
                    </div>
                    <div>
                        <h1 class="font-black text-xl text-slate-800 tracking-tight leading-none">System Control</h1>
                        <div class="flex items-center gap-1.5 mt-1">
                            <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
                            <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Super Admin Active</p>
                        </div>
                    </div>
                </div>
                <button @click="keluar" class="px-4 py-2 bg-slate-50 hover:bg-slate-100 rounded-xl text-slate-500 hover:text-red-500 font-bold border border-slate-200 active:scale-95 transition-all flex items-center gap-2 shadow-sm text-sm">
                    <span class="hidden sm:inline">Keluar</span> <i data-lucide="log-out" class="w-4 h-4"></i>
                </button>
            </header>

            <div class="p-5 lg:p-8 flex flex-col lg:flex-row gap-6 lg:gap-8">
                
                <!-- KOLOM KIRI: API & KEAMANAN -->
                <div class="w-full lg:w-1/2 space-y-6">
                    <div class="flex items-center gap-2 mb-2">
                        <div class="p-1.5 bg-blue-50 text-blue-500 rounded-lg"><i data-lucide="shield-check" class="w-4 h-4"></i></div>
                        <h2 class="text-xs font-black text-slate-500 uppercase tracking-widest">Database & API</h2>
                    </div>

                    <!-- Konfigurasi API -->
                    <div class="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm hover:shadow-md transition-shadow">
                        <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 ml-1">URL Google Sheets API</label>
                        <input type="url" v-model="form.googleUrl" placeholder="https://script.google.com/..." class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl text-xs font-medium text-slate-700 outline-none focus:border-indigo-500 focus:bg-white transition-all mb-5 shadow-inner">
                        
                        <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 ml-1">Gemini AI Key <span class="text-xs text-rose-500">*</span></label>
                        <input type="password" v-model="form.geminiKey" placeholder="AIzaSy..." class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl text-xs font-medium text-slate-700 outline-none focus:border-indigo-500 focus:bg-white transition-all shadow-inner">
                        <p class="text-[9px] text-slate-400 mt-2 ml-2 italic">*Pastikan menggunakan API Key versi terbaru (v1)</p>
                    </div>

                    <div class="flex items-center gap-2 mb-2 mt-6">
                        <div class="p-1.5 bg-amber-50 text-amber-500 rounded-lg"><i data-lucide="key" class="w-4 h-4"></i></div>
                        <h2 class="text-xs font-black text-slate-500 uppercase tracking-widest">Access Control</h2>
                    </div>

                    <!-- Manajemen PIN -->
                    <div class="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm hover:shadow-md transition-shadow">
                        <div class="grid grid-cols-2 gap-5">
                            <div>
                                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 ml-1">PIN Kasir (Pelatih)</label>
                                <input type="password" inputmode="numeric" maxlength="6" v-model="form.pinPelatih" @input="form.pinPelatih = form.pinPelatih.replace(/[^0-9]/g, '')" placeholder="192201" class="w-full text-center py-3.5 bg-slate-50 border border-slate-200 rounded-2xl font-black text-base text-slate-700 tracking-[0.3em] outline-none focus:border-indigo-500 focus:bg-white transition-all shadow-inner">
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 ml-1">PIN System Admin</label>
                                <input type="password" inputmode="numeric" maxlength="6" v-model="form.pinAdmin" @input="form.pinAdmin = form.pinAdmin.replace(/[^0-9]/g, '')" placeholder="192299" class="w-full text-center py-3.5 bg-slate-50 border border-slate-200 rounded-2xl font-black text-base text-slate-700 tracking-[0.3em] outline-none focus:border-rose-400 focus:bg-white transition-all shadow-inner">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- KOLOM KANAN: CMS PENGUMUMAN (Live Sync to Index) -->
                <div class="w-full lg:w-1/2 space-y-6">
                    <div class="flex items-center gap-2 mb-2">
                        <div class="p-1.5 bg-emerald-50 text-emerald-500 rounded-lg"><i data-lucide="radio" class="w-4 h-4"></i></div>
                        <h2 class="text-xs font-black text-slate-500 uppercase tracking-widest">Live Announcement (Sync to Home)</h2>
                    </div>

                    <div class="bg-gradient-to-br from-white to-slate-50 p-6 rounded-[2rem] border border-slate-200 shadow-md relative overflow-hidden h-full flex flex-col">
                        
                        <div class="flex gap-3 mb-6 bg-slate-100 p-1.5 rounded-2xl">
                            <label class="flex-1 cursor-pointer">
                                <input type="radio" value="info" v-model="form.tipePengumuman" class="peer sr-only">
                                <div class="px-4 py-2.5 rounded-xl text-slate-500 font-bold text-[11px] text-center peer-checked:bg-white peer-checked:text-indigo-600 peer-checked:shadow-sm transition-all uppercase tracking-wider flex justify-center items-center gap-1.5">
                                    <i data-lucide="info" class="w-3.5 h-3.5"></i> Info Biasa
                                </div>
                            </label>
                            <label class="flex-1 cursor-pointer">
                                <input type="radio" value="penting" v-model="form.tipePengumuman" class="peer sr-only">
                                <div class="px-4 py-2.5 rounded-xl text-slate-500 font-bold text-[11px] text-center peer-checked:bg-white peer-checked:text-rose-500 peer-checked:shadow-sm transition-all uppercase tracking-wider flex justify-center items-center gap-1.5">
                                    <i data-lucide="alert-triangle" class="w-3.5 h-3.5"></i> Penting!
                                </div>
                            </label>
                        </div>

                        <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 ml-1">Judul Agenda</label>
                        <input type="text" v-model="form.judulPengumuman" placeholder="Contoh: Tes Sabuk Hijau Dipercepat" class="w-full px-5 py-4 bg-white border border-slate-200 rounded-2xl text-sm font-bold text-slate-800 outline-none focus:border-indigo-500 focus:shadow-[0_0_0_3px_rgba(99,102,241,0.1)] transition-all mb-5">
                        
                        <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 ml-1 flex justify-between">
                            <span>Isi Pesan</span>
                            <span :class="form.isiPengumuman.length >= 140 ? 'text-rose-500' : 'text-slate-400'">{{ form.isiPengumuman.length }}/150</span>
                        </label>
                        <textarea v-model="form.isiPengumuman" rows="4" maxlength="150" placeholder="Ketik detail pengumuman yang akan langsung tampil di halaman depan..." class="w-full px-5 py-4 bg-white border border-slate-200 rounded-2xl text-sm font-medium text-slate-700 outline-none focus:border-indigo-500 focus:shadow-[0_0_0_3px_rgba(99,102,241,0.1)] transition-all resize-none flex-grow"></textarea>
                        
                        <div class="mt-4 p-3 bg-indigo-50 rounded-xl border border-indigo-100 flex gap-2">
                            <i data-lucide="zap" class="w-4 h-4 text-indigo-500 shrink-0 mt-0.5"></i>
                            <p class="text-[10px] text-indigo-700 leading-relaxed font-medium">Perubahan di sini akan secara otomatis (*real-time*) ter-update di papan pengumuman halaman index dan portal siswa.</p>
                        </div>
                    </div>
                </div>

            </div>

            <!-- Tombol Simpan (Fixed on Mobile, Absolute Bottom on Desktop) -->
            <div class="lg:mt-auto border-t border-slate-100 bg-white/80 backdrop-blur-md p-5 lg:p-6 sticky bottom-0 z-20">
                <button @click="simpanPengaturan" :disabled="isSaving" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-black py-4 lg:py-5 rounded-2xl active:scale-95 flex justify-center items-center gap-2 transition-all shadow-xl shadow-slate-900/20 disabled:opacity-50 text-sm uppercase tracking-widest">
                    <i v-if="isSaving" data-lucide="loader-2" class="w-5 h-5 animate-spin"></i>
                    <span v-else class="flex items-center gap-2">
                        <i data-lucide="cloud-lightning" class="w-5 h-5"></i> Simpan & Publikasi Konfigurasi
                    </span>
                </button>
            </div>

        </main>
    </div>

        <script>
        const { createApp, ref, reactive, onMounted, nextTick } = Vue;

        createApp({
            setup() {
                const toasts = ref([]);
                const isSaving = ref(false);
                const isLoadingData = ref(false);

                // Form Reactive terikat dengan Data
                const form = reactive({
                    googleUrl: 'https://script.google.com/macros/s/AKfycbzFfHr42XmOTdehUsRo10bBms5n5k22bso6EcjEpHjLiqxqndYkhUnTnVJqbY2Qtc4K/exec',
                    geminiKey: '',
                    pinPelatih: '', 
                    pinAdmin: '',   
                    tipePengumuman: 'info',
                    judulPengumuman: '',
                    isiPengumuman: ''
                });

                const showToast = (msg, isError = false) => {
                    const id = Date.now();
                    toasts.value.push({ id, msg, type: isError ? 'error' : 'success' });
                    setTimeout(() => { toasts.value = toasts.value.filter(t => t.id !== id); }, 3000);
                    nextTick(() => { if (window.lucide) lucide.createIcons(); });
                };

                // Menarik Konfigurasi dari Google Sheets Server
                const muatPengaturanServer = async () => {
                    const savedUrl = localStorage.getItem('terate_google_url');
                    if (savedUrl) form.googleUrl = savedUrl;
                    
                    if (!form.googleUrl) return;

                    isLoadingData.value = true;
                    showToast("Sedang menyinkronkan data dari server...");

                    try {
                        const response = await fetch(form.googleUrl + "?action=get_config");
                        const result = await response.json();
                        
                        if (result.status === "success" && result.data) {
                            form.geminiKey = result.data.GEMINI_KEY || '';
                            form.pinPelatih = result.data.PIN_PELATIH || '';
                            form.pinAdmin = result.data.PIN_ADMIN || '';
                            form.tipePengumuman = result.data.PENGUMUMAN_TIPE || 'info';
                            form.judulPengumuman = result.data.PENGUMUMAN_JUDUL || '';
                            form.isiPengumuman = result.data.PENGUMUMAN_ISI || '';
                            
                            showToast("Data berhasil disinkronkan dengan Server.");
                        }
                    } catch (error) {
                        showToast("Gagal mengambil data dari server.", true);
                    } finally {
                        isLoadingData.value = false;
                    }
                };

                // Menyimpan Perubahan kembali ke Google Sheets
                const simpanPengaturan = async () => {
                    if (!form.googleUrl) return showToast("URL Google API wajib diisi!", true);
                    
                    isSaving.value = true;
                    
                    // Kita simpan URL API saja ke perangkat lokal
                    localStorage.setItem('terate_google_url', form.googleUrl);

                    const payload = {
                        tipe: "SAVE_CONFIG",
                        geminiKey: form.geminiKey,
                        pinPelatih: form.pinPelatih,
                        pinAdmin: form.pinAdmin,
                        tipePengumuman: form.tipePengumuman,
                        judulPengumuman: form.judulPengumuman,
                        isiPengumuman: form.isiPengumuman
                    };

                    try {
                        const response = await fetch(form.googleUrl, {
                            method: "POST",
                            headers: { "Content-Type": "text/plain" }, // mode no-cors jika dibutuhkan
                            body: JSON.stringify(payload)
                        });
                        
                        const result = await response.json();
                        
                        if (result.status === "success") {
                            showToast("Konfigurasi Sistem Berhasil Diamankan di Server.");
                        } else {
                            showToast(result.message, true);
                        }
                    } catch (error) {
                        // Karena CORS Google terkadang memblokir balikan POST dari klien, 
                        // kita anggap sukses jika request berhasil terkirim tanpa throw network error fatal.
                        showToast("Konfigurasi disimpan. (Mengabaikan peringatan CORS).");
                    } finally {
                        isSaving.value = false;
                    }
                };

                const keluar = () => { window.location.href = 'index.html'; };

                onMounted(() => {
                    muatPengaturanServer();
                    if (window.lucide) lucide.createIcons();
                });

                return { toasts, isSaving, isLoadingData, form, simpanPengaturan, keluar };
            }
        }).mount('#app');
    </script>

</body>
</html>
